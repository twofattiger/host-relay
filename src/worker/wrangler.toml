# 仅首次部署需要它:与 worker.js 同目录,跑一次 `npx wrangler deploy`。
# 之后改代码可直接在 Cloudflare Dashboard 网页编辑器粘贴 worker.js。
name = "host-relay"
main = "worker.js"
compatibility_date = "2026-06-05"

[[durable_objects.bindings]]
name = "HUB"
class_name = "Hub"

[[durable_objects.bindings]]
name = "HOST"
class_name = "Host"

# 这条 migration 就是"必须用 wrangler 跑一次"的原因;SQLite 类,免费计划可用。
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Hub", "Host"]

# 部署后在 Dashboard -> Settings -> Variables & Secrets 添加(均为 Secret 类型):
#   ADMIN_PASSWORD   面板登录密码
#   SESSION_SECRET   会话 cookie 签名密钥(随机长字符串)
# 或用命令:
#   npx wrangler secret put ADMIN_PASSWORD
#   npx wrangler secret put SESSION_SECRET
#
# M3(网页 SSH)时再补:
#   TICKET_KEY       SSH ticket 签名密钥
#   ENC_KEY          保存密码用的 AES-GCM 密钥
